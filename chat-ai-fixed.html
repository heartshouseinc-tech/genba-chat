<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場チャット">
<link rel="manifest" href="chat-manifest.json">
<title>現場チャット</title>

<script type="module">

import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
 onSnapshot, query, orderBy, limit, serverTimestamp, updateDoc,
 deleteDoc, where, arrayUnion }
 from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
 apiKey: "AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
 authDomain: "kensetsu-nippo-842a2.firebaseapp.com",
 projectId: "kensetsu-nippo-842a2",
 storageBucket: "kensetsu-nippo-842a2.firebasestorage.app",
 messagingSenderId: "702880974315",
 appId: "1:702880974315:web:985321dc9180046629c5ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

window.__fb = {

 collection, doc, addDoc, setDoc, getDoc, getDocs,
 onSnapshot, query, orderBy, limit, serverTimestamp, updateDoc,
 deleteDoc, where, arrayUnion
};
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
 --bm:#1565C0;--bd:#0D47A1;--bmi:#1976D2;--bl:#42A5F5;--bp:#BBDEFB;--bg:#E3F2FD;
 --g:#2E7D32;--gl:#43A047;--r:#C62828;--o:#E65100;
 --g1:#F5F5F5;--g2:#EEEEEE;--g3:#E0E0E0;--g4:#BDBDBD;--g6:#757575;--g8:#424242;--g9:#212121;
 --bme:#DCF8C6;--bme-d:#1E3A2F;--bot:#FFFFFF;--bot-d:#2D2D2D;
 --bgc:#ECE5DD;--bgc-d:#1A1A2E;
 --font:'Hiragino Sans','Meiryo',sans-serif;
 --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:#1565C0;}
body.dark{--g1:#2D2D2D;--g2:#3D3D3D;--g3:#4D4D4D;--g4:#5D5D5D;--g6:#AAAAAA;--g8:#DDDDDD;--g9:#EEEEEE;background:#0D1117;}

.screen{display:none;position:fixed;inset:0;flex-direction:column;}
.screen.active{display:flex;}

/* ===== LOGIN ===== */
#loginScreen{background:linear-gradient(160deg,#0D47A1,#1565C0,#1976D2);align-items:center;justify-content:center;padding:20px;}
.lwrap{width:min(420px,100%);animation:fadeUp .4s ease;}
@keyframes fadeUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.llogo{text-align:center;margin-bottom:24px;}
.llogo .ico{font-size:50px;display:block;margin-bottom:8px;}
.llogo h1{color:#fff;font-size:22px;font-weight:700;}
.llogo p{color:rgba(255,255,255,.7);font-size:13px;margin-top:4px;}
.lcard{background:#fff;border-radius:20px;padding:24px 20px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.ltabs{display:flex;margin-bottom:18px;background:var(--g1);border-radius:10px;padding:3px;}
.ltab{flex:1;padding:9px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:600;color:var(--g6);cursor:pointer;transition:all .2s;}
.ltab.active{background:#fff;color:var(--bm);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.lg{margin-bottom:13px;}
.lg label{display:block;font-size:12px;font-weight:700;color:var(--g8);margin-bottom:4px;}
.lg input{width:100%;padding:12px 13px;border:2px solid var(--g3);border-radius:10px;font-size:16px;outline:none;transition:border-color .2s;}
.lg input:focus{border-color:var(--bm);}
.btn-google{width:100%;padding:12px;background:#fff;border:2px solid var(--g3);border-radius:10px;font-size:14px;font-weight:600;color:var(--g8);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.gi{width:20px;height:20px;}
.btn-primary{width:100%;padding:13px;background:var(--bm);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--g4);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--g3);}
.lerr{color:var(--r);font-size:12px;text-align:center;margin-top:8px;min-height:16px;}

/* ===== MAIN (Tab Layout) ===== */
#mainScreen{background:var(--g1);}
.main-header{background:var(--bm);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.main-header h1{font-size:17px;font-weight:700;}
.hbtns{display:flex;gap:6px;}
.ibtn{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;}
.ibtn:hover{background:rgba(255,255,255,.3);}

/* Tab bar */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--g3);flex-shrink:0;}
.tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--g6);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:3px solid transparent;transition:all .2s;position:relative;}
.tab-btn.active{color:var(--bm);border-bottom-color:var(--bm);}
.tab-btn .ticon{font-size:20px;}
.tab-content{flex:1;overflow:hidden;display:none;flex-direction:column;}
.tab-content.active{display:flex;}
.unread-dot{position:absolute;top:4px;right:calc(50% - 16px);background:var(--r);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* Search bar */
.sbar{padding:8px 12px;background:#fff;border-bottom:1px solid var(--g3);flex-shrink:0;}
.sbar-wrap{position:relative;}
.sbar-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
.sbar input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--g3);border-radius:20px;font-size:14px;outline:none;background:var(--g1);}

/* Room list */
.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.list-section{padding:6px 12px 3px;font-size:11px;font-weight:700;color:var(--g6);letter-spacing:.5px;background:var(--g1);}
.list-item{display:flex;align-items:center;gap:11px;padding:11px 14px;background:#fff;border-bottom:1px solid var(--g2);cursor:pointer;transition:background .15s;position:relative;}
.list-item:active{background:var(--bg);}
.list-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden;}
.list-icon img{width:100%;height:100%;object-fit:cover;}
.list-info{flex:1;min-width:0;}
.list-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.list-name{font-size:14px;font-weight:700;color:var(--g9);}
.list-time{font-size:11px;color:var(--g6);}
.list-last{font-size:12px;color:var(--g6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ubadge{background:var(--r);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;}
.online-dot{width:10px;height:10px;border-radius:50%;background:#4CAF50;border:2px solid #fff;position:absolute;bottom:12px;left:46px;}
.offline-dot{width:10px;height:10px;border-radius:50%;background:var(--g4);border:2px solid #fff;position:absolute;bottom:12px;left:46px;}
.fab{position:fixed;bottom:calc(70px + var(--sb));right:16px;width:52px;height:52px;border-radius:50%;background:var(--bm);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(21,101,192,.4);display:flex;align-items:center;justify-content:center;z-index:10;}
.fab:active{transform:scale(.9);}

/* ===== CHAT ===== */
#chatScreen{background:var(--bgc);}
body.dark #chatScreen{background:var(--bgc-d);}
.chat-header{background:var(--bm);color:#fff;padding:10px 12px;display:flex;align-items:center;gap:9px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.back-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:2px;line-height:1;}
.chinfo{flex:1;min-width:0;display:flex;align-items:center;gap:9px;}
.ch-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;overflow:hidden;}
.ch-avatar img{width:100%;height:100%;object-fit:cover;}
.ch-text{flex:1;min-width:0;}
.ch-name{font-size:15px;font-weight:700;}
.ch-status{font-size:11px;opacity:.8;}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 8px;-webkit-overflow-scrolling:touch;}
.date-div{text-align:center;margin:12px 0;}
.date-div span{background:rgba(0,0,0,.28);color:#fff;font-size:11px;padding:4px 12px;border-radius:12px;}
.mrow{display:flex;align-items:flex-end;gap:6px;margin-bottom:6px;}
.mrow.me{flex-direction:row-reverse;}
.mav{width:28px;height:28px;border-radius:50%;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.mav img{width:100%;height:100%;object-fit:cover;}
.mbody{max-width:76%;display:flex;flex-direction:column;}
.mrow.me .mbody{align-items:flex-end;}
.mname{font-size:10px;color:var(--g6);margin-bottom:2px;padding:0 3px;}
.bubble{padding:9px 12px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.1);position:relative;}
.bubble.other{background:var(--bot);border-radius:18px 18px 18px 4px;color:var(--g9);}
.bubble.me{background:var(--bme);border-radius:18px 18px 4px 18px;color:#1a3a1a;}
.bubble img{max-width:200px;max-height:200px;border-radius:10px;cursor:pointer;display:block;}
.mmeta{display:flex;align-items:center;gap:4px;margin-top:2px;padding:0 3px;}
.mtime{font-size:10px;color:var(--g6);}
.mread{font-size:10px;color:var(--bl);}
.bubble .macts{display:none;position:absolute;top:-34px;right:0;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.2);overflow:hidden;z-index:10;white-space:nowrap;}
.bubble:active .macts,.bubble:hover .macts{display:flex;}
.mact{padding:7px 10px;border:none;background:none;font-size:12px;cursor:pointer;color:var(--g8);}
.mact.del{color:var(--r);}
.mention{color:var(--bm);font-weight:700;}

/* Input */
.cinput-wrap{background:#fff;border-top:1px solid var(--g3);padding:7px 8px;padding-bottom:calc(7px + var(--sb));flex-shrink:0;}
.irow{display:flex;align-items:flex-end;gap:6px;}
.iacts{display:flex;gap:3px;}
.iact{width:36px;height:36px;border:none;background:transparent;color:var(--g6);font-size:20px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.iact:hover{background:var(--g2);}
.ibox{flex:1;display:flex;align-items:flex-end;background:var(--g1);border:1.5px solid var(--g3);border-radius:20px;padding:7px 12px;gap:6px;min-height:40px;}
.cinput{flex:1;border:none;background:transparent;outline:none;font-size:14px;resize:none;max-height:110px;line-height:1.5;font-family:var(--font);}
.sbtn{width:40px;height:40px;border-radius:50%;background:var(--bm);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(21,101,192,.3);}
.sbtn:disabled{background:var(--g4);box-shadow:none;cursor:default;}
.img-prev-row{display:none;padding:5px 0;gap:6px;flex-wrap:wrap;}
.img-prev-row.show{display:flex;}
.ip{position:relative;}
.ip img{width:58px;height:58px;object-fit:cover;border-radius:8px;}
.ip-rm{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--r);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mention-list{background:#fff;border:1px solid var(--g3);border-radius:10px;max-height:140px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);margin:0 8px 3px;}
.mitem{padding:9px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;}
.mitem:active{background:var(--bg);}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-bg.ctr{align-items:center;padding:20px;}
.msheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:82vh;overflow-y:auto;padding:20px;animation:slideUp .3s ease;}
.msheet.ctr{border-radius:16px;animation:fadeIn .2s ease;max-width:420px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.mhandle{width:38px;height:4px;background:var(--g3);border-radius:2px;margin:0 auto 14px;}
.mtitle{font-size:16px;font-weight:700;color:var(--g9);margin-bottom:14px;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--g8);margin-bottom:4px;}
.fg input,.fg select{width:100%;padding:11px 13px;border:2px solid var(--g3);border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;font-family:var(--font);}
.fg input:focus,.fg select:focus{border-color:var(--bm);}
.rtype-btns{display:flex;gap:7px;flex-wrap:wrap;}
.rtype-btn{padding:9px 13px;border:2px solid var(--g3);border-radius:10px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.rtype-btn.active{border-color:var(--bm);background:var(--bg);color:var(--bm);}
.brow{display:flex;gap:9px;margin-top:14px;}
.bcnc{flex:1;padding:12px;background:var(--g2);color:var(--g8);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
.bsub{flex:2;padding:12px;background:var(--bm);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}

/* Image viewer */
#imgViewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;align-items:center;justify-content:center;overflow:hidden;}
#imgViewer.open{display:flex;}
#iv-container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#imgViewer img{max-width:95%;max-height:90vh;border-radius:8px;object-fit:contain;transform-origin:center center;transition:transform 0.1s ease;touch-action:none;user-select:none;}
.iv-close{position:absolute;top:16px;right:16px;color:#fff;font-size:26px;cursor:pointer;background:rgba(255,255,255,.1);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;}
.iv-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:12px;white-space:nowrap;}

/* Toast */
.toast{position:fixed;bottom:calc(80px + var(--sb));left:50%;transform:translateX(-50%) translateY(20px);background:var(--g9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:600;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--g);}
.toast.error{background:var(--r);}

/* Offline */
.offbar{display:none;background:var(--o);color:#fff;text-align:center;padding:5px;font-size:12px;font-weight:600;flex-shrink:0;}
.offbar.show{display:block;}

/* Loading */
.loading{display:none;position:fixed;inset:0;background:var(--bm);z-index:700;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.loading.show{display:flex;}
.loader{width:42px;height:42px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#fff;font-size:15px;font-weight:600;}

/* Dark mode */
body.dark .lcard{background:#1E1E1E;}
body.dark .lg input{background:#2D2D2D;border-color:#3D3D3D;color:#eee;}
body.dark .ltab.active{background:#2D2D2D;color:#42A5F5;}
body.dark #mainScreen{background:#121212;}
body.dark .list-section{background:#121212;}
body.dark .list-item{background:#1E1E1E;border-color:#2D2D2D;}
body.dark .list-name{color:#eee;}
body.dark .list-last{color:#aaa;}
body.dark .tab-bar{background:#1E1E1E;border-color:#2D2D2D;}
body.dark .tab-btn.active{color:#42A5F5;}
body.dark .sbar{background:#1E1E1E;border-color:#2D2D2D;}
body.dark .sbar input{background:#2D2D2D;border-color:#3D3D3D;color:#eee;}
body.dark .bubble.other{background:var(--bot-d);color:#ddd;}
body.dark .bubble.me{background:var(--bme-d);color:#90EE90;}
body.dark .cinput-wrap{background:#1E1E1E;border-color:#2D2D2D;}
body.dark .ibox{background:#2D2D2D;border-color:#3D3D3D;}
body.dark .cinput{color:#eee;}
body.dark .msheet{background:#1E1E1E;}
body.dark .mtitle{color:#eee;}
body.dark .fg input,.fg select{background:#2D2D2D;border-color:#3D3D3D;color:#eee;}
body.dark .bcnc{background:#2D2D2D;color:#aaa;}
body.dark .mention-list{background:#1E1E1E;}

/* Scrollbar */
.chat-msgs::-webkit-scrollbar,.list-scroll::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb,.list-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
.ai-qbtn{background:rgba(66,133,244,.15);border:1px solid rgba(66,133,244,.3);border-radius:12px;color:#4285f4;font-size:10px;padding:4px 10px;cursor:pointer;white-space:nowrap}
.ai-qbtn:active{background:rgba(66,133,244,.3)}
#mainAiInput::placeholder{color:rgba(255,255,255,.3)}
#mainAiInput:focus{outline:1px solid #4285f4}
.ai-qbtn:active{background:rgba(66,133,244,.3)}
.ai-msg{background:linear-gradient(135deg,rgba(66,133,244,.15),rgba(52,168,83,.1));border-left:3px solid #4285f4;border-radius:0 8px 8px 0;padding:8px 12px;margin:6px 0;font-size:12px;color:#e0e0e0;line-height:1.6}

@media(min-width:768px){
 .chat-msgs{padding:14px 20%;}
 .chat-header,.cinput-wrap{padding-left:20%;padding-right:20%;}
}

/* DM tab user list */
.dm-empty{text-align:center;padding:40px 20px;color:var(--g6);font-size:14px;}
</style>
</head>
<body>

 <div class="loader"></div>
 <p>現場チャット 起動中...</p>
</div>

 <div class="lwrap">

 </div>

<script>

 user: null, userDoc: null, isAdmin: false,
 currentRoom: null, currentRoomType: null, // 'room' | 'dm'
 rooms: [], messages: [], allUsers: [],
 msgUnsub: null, roomUnsub: null, userUnsub: null,
 pendingImgs: [],
 isDark: localStorage.getItem('dark')==='1',
 selRoomType: 'general',
 dmRooms: [], // DM rooms cache
 unreadCounts: {}, // roomId -> count
};

function fb(){ return window.__fb; }
if(A.isDark) document.body.classList.add('dark');

document.addEventListener('DOMContentLoaded', ()=>{
 const upd=()=>{ const off=!navigator.onLine; document.getElementById('offBar1').classList.toggle('show',off); document.getElementById('offBar2').classList.toggle('show',off); };
 window.addEventListener('online',()=>{ upd(); showToast('オンライン復帰','success'); });
 window.addEventListener('offline',upd); upd();

if('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister())); }
 document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{ if(e.target===bg)bg.classList.remove('open'); }));

 fb().onAuthStateChanged(fb().auth, async user=>{
 document.getElementById('loadingScreen').classList.remove('show');
 if(user){
 A.user=user;
 await loadUserDoc();

function listenMsgs(roomId, type){
 const{query,orderBy,limit,onSnapshot}=fb();

 const q=query(col,orderBy('createdAt','asc'),limit(100));
 A.msgUnsub=onSnapshot(q,snap=>{
 const c=document.getElementById('chatMsgs');
 const atBot=c.scrollHeight-c.scrollTop-c.clientHeight<80;
 snap.docChanges().forEach(ch=>{
 if(ch.type==='added'){ const m={id:ch.doc.id,...ch.doc.data()}; A.messages.push(m); appendMsg(m); markRead(roomId,m.id,type); }
 else if(ch.type==='modified'){ const m={id:ch.doc.id,...ch.doc.data()}; const i=A.messages.findIndex(x=>x.id===m.id); if(i>=0)A.messages[i]=m; updateMsgEl(m); }
 else if(ch.type==='removed'){ const el=document.getElementById('m-'+ch.doc.id); if(el)el.remove(); }
 });
 if(atBot) scrollBot();
 },err=>console.error(err));
}

function appendMsg(msg){

 const dk=d.toDateString();
 if(!c.querySelector(`[data-date="${dk}"]`)){
 const dv=document.createElement('div'); dv.className='date-div'; dv.dataset.date=dk;
 dv.innerHTML=`<span>${fmtDate(d)}</span>`; c.appendChild(dv);
 }
 const isMe=msg.uid===A.user?.uid;
 const row=document.createElement('div'); row.className='mrow'+(isMe?' me':''); row.id='m-'+msg.id;
 const name=esc(msg.name||'不明');
 const avContent=msg.photoURL?`<img src="${msg.photoURL}" alt="">`:(msg.name||'?').charAt(0);
 const time=msg.createdAt?.toDate?fmtTime(msg.createdAt.toDate()):'';
 const read=isMe&&msg.readBy&&msg.readBy.length>1?`<span class="mread">既読${msg.readBy.length-1}</span>`:'';
 const canDel=isMe||A.isAdmin;
 const delBtn=canDel?`<button class="mact del" onclick="delMsg('${msg.id}')">削除</button>`:'';
 let content='';
 if(msg.imageData){ content=`<img src="${msg.imageData}" alt="画像" onclick="openViewer('${msg.imageData.replace(/'/g,"\\'")}')">`; }
 else{ content=fmtText(msg.text||''); }
 row.innerHTML=`${!isMe?`<div class="mav">${avContent}</div>`:''}<div class="mbody">${!isMe?`<div class="mname">${name}</div>`:''}<div class="bubble ${isMe?'me':'other'}">${content}<div class="macts"><button class="mact" onclick="replyTo('${msg.id}')">返信</button>${delBtn}</div></div><div class="mmeta"><span class="mtime">${time}</span>${read}</div></div>${isMe?`<div class="mav">${avContent}</div>`:''}`;
 c.appendChild(row);
}

 if(msg.uid===A.user?.uid){

 const meta=el.querySelector('.mmeta'); if(meta){ const t=msg.createdAt?.toDate?fmtTime(msg.createdAt.toDate()):''; meta.innerHTML=`<span class="mtime">${t}</span>${read}`; }
 }

 if(!text&&A.pendingImgs.length===0)return;
 if(!A.currentRoom)return;
 sending=true; document.getElementById('sendBtn').disabled=true;
 try{
 const{db,addDoc,serverTimestamp,doc,updateDoc}=fb();
 const rid=A.currentRoom.id, type=A.currentRoomType;
 const col=getMsgCollection(rid,type);
 const updateRef=type==='dm'?fb().doc(db,'dms',rid):fb().doc(db,'rooms',rid);

 for(const img of A.pendingImgs){
 await addDoc(col,{uid:A.user.uid,name:A.userDoc?.name||A.user.displayName||A.user.email,photoURL:A.user.photoURL||'',text:'',imageData:img.data,createdAt:serverTimestamp(),readBy:[A.user.uid]});
 }
 A.pendingImgs=[]; document.getElementById('imgPrev').innerHTML=''; document.getElementById('imgPrev').classList.remove('show');

async function compressImage(file, maxSizeKB=800){
 return new Promise((resolve)=>{
 const reader=new FileReader();
 reader.onload=e=>{
 const img=new Image();
 img.onload=()=>{
 const canvas=document.createElement('canvas');
 let w=img.width, h=img.height;

 const maxDim=1200;
 if(w>maxDim||h>maxDim){
 if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}
 else{w=Math.round(w*maxDim/h);h=maxDim;}
 }
 canvas.width=w; canvas.height=h;
 const ctx=canvas.getContext('2d');
 ctx.drawImage(img,0,0,w,h);

 let quality=0.85;
 let data=canvas.toDataURL('image/jpeg',quality);
 while(data.length>maxSizeKB*1024*1.37&&quality>0.3){
 quality-=0.1;
 data=canvas.toDataURL('image/jpeg',quality);
 }
 resolve(data);
 };
 img.src=e.target.result;
 };
 reader.readAsDataURL(file);
 });
}

        .replace(/新しい|ルームを?作って|ルームを?作成|チームのルーム|のルーム|つくって/g, '')

let ivScale=1, ivLastScale=1, ivStartDist=0, ivDragging=false;
let ivStartX=0, ivStartY=0, ivTransX=0, ivTransY=0, ivLastX=0, ivLastY=0;

function openViewer(url){
 const img=document.getElementById('viewerImg');
 img.src=url; ivScale=1; ivLastScale=1; ivTransX=0; ivTransY=0;
 img.style.transform='scale(1) translate(0px,0px)';
 document.getElementById('imgViewer').classList.add('open');
 setupViewerTouch(img);
}

function setupViewerTouch(img){
 let lastTap=0;
 img.ontouchstart=e=>{
 if(e.touches.length===2){
 ivStartDist=Math.hypot(
 e.touches[0].clientX-e.touches[1].clientX,
 e.touches[0].clientY-e.touches[1].clientY
 );
 ivLastScale=ivScale;
 } else if(e.touches.length===1){
 ivDragging=true;
 ivStartX=e.touches[0].clientX-ivTransX;
 ivStartY=e.touches[0].clientY-ivTransY;
 }
 e.preventDefault();
 };
 img.ontouchmove=e=>{
 if(e.touches.length===2){
 const dist=Math.hypot(
 e.touches[0].clientX-e.touches[1].clientX,
 e.touches[0].clientY-e.touches[1].clientY
 );
 ivScale=Math.min(Math.max(ivLastScale*(dist/ivStartDist),0.5),5);
 img.style.transform=`scale(${ivScale}) translate(${ivTransX/ivScale}px,${ivTransY/ivScale}px)`;
 } else if(e.touches.length===1&&ivDragging&&ivScale>1){
 ivTransX=e.touches[0].clientX-ivStartX;
 ivTransY=e.touches[0].clientY-ivStartY;
 img.style.transform=`scale(${ivScale}) translate(${ivTransX/ivScale}px,${ivTransY/ivScale}px)`;
 }
 e.preventDefault();
 };
 img.ontouchend=e=>{
 ivDragging=false;

 if(e.touches.length===0&&ivLastScale!==ivScale){
 ivLastScale=ivScale;
 }

 const now=Date.now();
 if(now-lastTap<300){
 ivScale=1; ivLastScale=1; ivTransX=0; ivTransY=0;
 img.style.transform='scale(1) translate(0px,0px)';
 }
 lastTap=now;
 };
 img.ondblclick=()=>{
 ivScale=1; ivLastScale=1; ivTransX=0; ivTransY=0;
 img.style.transform='scale(1) translate(0px,0px)';
 };
}

var T = {
  items: [],           // 全道具データ
  mode: 'item',        // 'item' | 'site'
  selItemTab: null,    // 選択中の道具タブ
  selSiteTab: null,    // 選択中の現場タブ
  unsub: null,         // Firestoreリスナー解除
  masterCustom: []     // Firestoreから読み込んだカスタム道具名
};

// ── 道具名マスター管理 ──
// プリセット＋Firestoreのカスタム分をマージして返す
function getToolMasterAll(){
  return [...new Set([...TOOL_MASTER_PRESET, ...T.masterCustom])].sort();
}

// Firestoreからカスタム道具名を読み込む（アプリ起動時・道具タブ開いた時）
async function loadToolMaster(){
  try{
    const{db,collection,getDocs}=fb();
    const snap=await getDocs(collection(db,'tool_master'));
    T.masterCustom=[];
    snap.forEach(d=>{ if(d.data().name) T.masterCustom.push(d.data().name); });
  }catch(e){ console.warn('tool_master load error',e); }
}

// 新しい道具名をFirestoreに自動保存（プリセットにない場合のみ）
async function autoSaveToolMaster(name){
  if(!name) return;
  const already=[...TOOL_MASTER_PRESET,...T.masterCustom].includes(name);
  if(already) return;
  try{
    const{db,collection,addDoc,serverTimestamp}=fb();
    await addDoc(collection(db,'tool_master'),{name,createdAt:serverTimestamp()});
    T.masterCustom.push(name); // ローカルにも即反映
    console.log('新しい道具名を保存しました:', name);
  }catch(e){ console.warn('tool_master save error',e); }
}

// 入力欄でサジェストを表示する
function showToolSuggest(inputId, suggestId){
  const inp=document.getElementById(inputId);
  const sug=document.getElementById(suggestId);
  if(!inp||!sug) return;
  const q=inp.value.trim().toLowerCase();
  if(!q){ sug.style.display='none'; return; }
  const matched=getToolMasterAll().filter(n=>n.toLowerCase().includes(q)).slice(0,8);
  if(!matched.length){ sug.style.display='none'; return; }
  sug.style.display='block';
  sug.innerHTML=matched.map(n=>
    `<div onclick="selectToolSuggest('${inputId}','${suggestId}','${esc(n)}')"
      style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #f1f5f9;hover:background:#f8fafc"
      onmouseover="this.style.background='#f0f9ff'" onmouseout="this.style.background=''">${esc(n)}</div>`
  ).join('');
}
function selectToolSuggest(inputId, suggestId, name){
  const inp=document.getElementById(inputId);
  if(inp) inp.value=name;
  const sug=document.getElementById(suggestId);
  if(sug) sug.style.display='none';
}

// ── Firestoreリアルタイム監視 ──
function loadTools(){
  loadToolMaster(); // カスタム道具名もロード
  if(T.unsub) T.unsub();
  const{db,collection,onSnapshot,query,orderBy}=fb();
  T.unsub = onSnapshot(
    query(collection(db,'tools'),orderBy('name')),
    snap=>{
      T.items=[];
      snap.forEach(d=>T.items.push({id:d.id,...d.data()}));
      renderToolsView();
    },
    err=>console.error('tools listen error',err)
  );
}

// ── モード切替 ──
function setToolMode(mode){
  T.mode=mode;
  document.getElementById('toolModeByItem').style.background = mode==='item'?'#1565c0':'#f1f5f9';
  document.getElementById('toolModeByItem').style.color      = mode==='item'?'#fff':'#64748b';
  document.getElementById('toolModeBySite').style.background = mode==='site'?'#1565c0':'#f1f5f9';
  document.getElementById('toolModeBySite').style.color      = mode==='site'?'#fff':'#64748b';
  if(mode==='item') T.selItemTab=null;
  else T.selSiteTab=null;
  renderToolsView();
}

// ── 一覧レンダリング（道具ごと/現場ごと） ──
function renderToolsView(){
  const list=document.getElementById('toolList');
  if(!list) return;
  const q=(document.getElementById('toolSearch')?.value||'').toLowerCase().trim();
  let items=T.items;
  if(q) items=items.filter(x=>(x.name||'').toLowerCase().includes(q)||(x.location||'').toLowerCase().includes(q));

  if(T.mode==='item') renderByItem(list, items);
  else renderBySite(list, items);
}

// ── 道具ごとビュー ──
function renderByItem(list, items){
  // カテゴリ単位でグループ化（タブ）
  const cats=[...new Set(T.items.map(x=>x.category||'その他'))].sort();
  const selCat = T.selItemTab || (cats[0]||null);

  // カテゴリタブ
  let html='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">';
  cats.forEach(cat=>{
    const active=cat===selCat;
    html+=`<button onclick="T.selItemTab='${esc(cat)}';renderToolsView()"
      style="padding:5px 10px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:700;
      background:${active?'#1565c0':'#e2e8f0'};color:${active?'#fff':'#475569'}">${esc(cat)}</button>`;
  });
  html+='</div>';

  // 選択カテゴリの道具を名前ごとに集約
  const catItems=items.filter(x=>(x.category||'その他')===selCat);
  const byName={};
  catItems.forEach(x=>{
    if(!byName[x.name]) byName[x.name]=[];
    byName[x.name].push(x);
  });

  if(!Object.keys(byName).length){
    html+='<div style="text-align:center;color:#94a3b8;padding:24px;font-size:12px">この種別の道具はまだ登録されていません</div>';
  } else {
    Object.entries(byName).forEach(([name, rows])=>{
      // 道具名ヘッダー
      html+=`<div style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:8px;overflow:hidden">
        <div style="background:#1e3a5f;color:#fff;padding:8px 12px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;font-weight:700">🔧 ${esc(name)}</span>
          <span style="font-size:11px;opacity:.8">合計 ${rows.reduce((s,r)=>s+(r.qty||0),0)} 個</span>
        </div>`;
      // 現場ごとの数量
      const sites=[...new Set(T.items.map(x=>x.location||'').filter(Boolean))].sort();
      const siteMap={};
      rows.forEach(r=>{ siteMap[r.location]=(siteMap[r.location]||0)+(r.qty||0); });
      sites.forEach(site=>{
        const qty=siteMap[site]||0;
        html+=`<div style="display:flex;align-items:center;padding:7px 12px;border-top:1px solid #f1f5f9;gap:8px">
          <span style="flex:1;font-size:12px;color:#374151">🏗️ ${esc(site)}</span>
          <span style="font-size:13px;font-weight:700;color:${qty>0?'#1565c0':'#94a3b8'}">${qty>0?qty+'個':'無し'}</span>
          ${rows.filter(r=>r.location===site).map(r=>
            `<button onclick="openEditTool('${r.id}')" style="background:none;border:1px solid #d1d5db;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;color:#6b7280">編集</button>`
          ).join('')}
        </div>`;
      });
      // どの現場にも無い場合は空欄
      if(!Object.keys(siteMap).length){
        html+=`<div style="padding:7px 12px;font-size:12px;color:#94a3b8;border-top:1px solid #f1f5f9">どの現場にも登録なし</div>`;
      }
      html+='</div>';
    });
  }
  list.innerHTML=html;
}

// ── 現場ごとビュー ──
function renderBySite(list, items){
  const sites=[...new Set(T.items.map(x=>x.location||'').filter(Boolean))].sort();
  const selSite = T.selSiteTab || (sites[0]||null);

  // 現場タブ
  let html='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">';
  sites.forEach(site=>{
    const active=site===selSite;
    html+=`<button onclick="T.selSiteTab='${esc(site)}';renderToolsView()"
      style="padding:5px 10px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:700;
      background:${active?'#2e7d32':'#e2e8f0'};color:${active?'#fff':'#475569'}">${esc(site)}</button>`;
  });
  html+='</div>';

  // 選択現場の道具一覧
  const siteItems=items.filter(x=>x.location===selSite);
  if(!selSite || !siteItems.length){
    html+=`<div style="text-align:center;color:#94a3b8;padding:24px;font-size:12px">${selSite?'この現場に道具の登録はありません':'現場がまだ登録されていません'}</div>`;
  } else {
    // カテゴリでグループ化
    const byCat={};
    siteItems.forEach(x=>{ const c=x.category||'その他'; if(!byCat[c])byCat[c]=[]; byCat[c].push(x); });
    Object.entries(byCat).forEach(([cat,rows])=>{
      html+=`<div style="background:#fff;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:8px;overflow:hidden">
        <div style="background:#2e7d32;color:#fff;padding:7px 12px;font-size:12px;font-weight:700">${esc(cat)}</div>`;
      rows.forEach(r=>{
        html+=`<div style="display:flex;align-items:center;padding:8px 12px;border-top:1px solid #f1f5f9;gap:8px">
          <span style="flex:1;font-size:13px;font-weight:700;color:#374151">${esc(r.name)}</span>
          <span style="font-size:14px;font-weight:700;color:#1565c0">${r.qty||0} 個</span>
          ${r.memo?`<span style="font-size:10px;color:#94a3b8">${esc(r.memo)}</span>`:''}
          <button onclick="openEditTool('${r.id}')" style="background:none;border:1px solid #d1d5db;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;color:#6b7280">編集</button>
          <button onclick="confirmDeleteTool('${r.id}','${esc(r.name)}')" style="background:none;border:1px solid #fca5a5;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;color:#ef4444">削除</button>
        </div>`;
      });
      html+='</div>';
    });
  }
  list.innerHTML=html;
}

function openEditTool(id){
  const r=T.items.find(x=>x.id===id); if(!r) return;
  document.getElementById('toolName').value=r.name||'';
  document.getElementById('toolCategory').value=r.category||'その他';
  document.getElementById('toolLocation').value=r.location||'';

async function saveTool(){
  const name=document.getElementById('toolName').value.trim();
  const location=document.getElementById('toolLocation').value.trim();
  if(!name||!location){showToast('道具名と現場は必須です','error');return;}
  const data={
    name, category:document.getElementById('toolCategory').value,
    location, qty:parseInt(document.getElementById('toolCount').value)||1,
    memo:document.getElementById('toolMemo').value.trim(),
    updatedAt:fb().serverTimestamp(), createdBy:A.userDoc?.uid||''
  };
  try{
    const{db,collection,doc,addDoc,setDoc}=fb();
    const editId=document.getElementById('addToolModal').dataset.editId;
    if(editId){
      await setDoc(doc(db,'tools',editId),data,{merge:true});
      showToast('✅ 更新しました');
    } else {
      data.createdAt=fb().serverTimestamp();
      await addDoc(collection(db,'tools'),data);
      showToast('✅ 登録しました');
    }
    autoSaveToolMaster(name); // 新しい道具名なら自動でマスターに保存
    closeAddToolModal();
  } catch(e){ showToast('❌ 保存失敗: '+e.message,'error'); }
}

async function confirmDeleteTool(id,name){
  if(!confirm(`「${name}」を削除しますか？`)) return;
  try{
    const{db,doc,deleteDoc}=fb();
    await deleteDoc(doc(db,'tools',id));
    showToast('🗑️ 削除しました');
  } catch(e){ showToast('❌ 削除失敗: '+e.message,'error'); }
}

// ── AI操作コマンド送信（核心部分） ──
async function sendToolAiCmd(){
  const inp=document.getElementById('toolAiInput');
  const text=inp.value.trim(); if(!text) return;
  const resEl=document.getElementById('toolAiResult');
  resEl.style.color='#34a853';
  resEl.textContent='🤖 AIが処理中...';
  inp.value='';

  // 在庫スナップショットをAIに渡す（最大50件）
  const invSnapshot=T.items.slice(0,50).map(x=>`${x.location}:${x.name}×${x.qty}`).join(', ')||'登録なし';
  // ルーム一覧もAIに渡す（ルーム作成判断のため）
  const roomNames=A.rooms.map(r=>r.name).join('、')||'なし';

  // AI にコマンドを解析させる（responseSchema で JSON 強制）
  const schema={
    type:'object',
    properties:{
      action:{type:'string', description:'実行アクション: add_tool/move_tool/remove_tool/update_qty/query/create_room/unknown'},
      toolName:{type:'string', description:'対象の道具・資材名'},
      qty:{type:'number', description:'数量（整数）'},
      category:{type:'string', description:'カテゴリ。不明なら空文字'},
      fromLocation:{type:'string', description:'移動元の現場名（moveの場合）'},
      toLocation:{type:'string', description:'追加先・移動先の現場名'},
      roomName:{type:'string', description:'作成するチャットルーム名（create_roomの場合）'},
      roomType:{type:'string', description:'ルーム種別: general/site/dept/private'},
      reply:{type:'string', description:'ユーザーへの自然な日本語返答（実行結果を含む）'}
    },
    required:['action','reply']
  };

  const prompt=`あなたは建設現場の道具・在庫管理AIです。
【現在の在庫状況】${invSnapshot}
【既存チャットルーム】${roomNames}
【ユーザーの指示】${text}

上記の指示を解析し、JSONで返してください。
action一覧:
- add_tool: 道具を現場に追加(toLocation必須)
- move_tool: 道具を現場から別現場へ移動(fromLocation/toLocation必須)
- remove_tool: 道具を削除・減らす
- update_qty: 数量を更新
- query: 在庫確認・質問への回答
- create_room: チャットルームを新規作成
- unknown: 判断できない場合
replyは実際に行う操作の内容を分かりやすく日本語で書いてください。`;

  try{
    var r=await fetch(FUNC_BASE+'/askAI',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-access-key':HH_KEY},
      body:JSON.stringify({prompt,model:'gemini-2.5-flash',useSearch:false,responseSchema:schema})
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    var d=await r.json();
    var raw=d?.data?.text||d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||'';
    // JSON抽出
    var cmd=null;
    try{ cmd=JSON.parse(raw.replace(/```json|```/g,'').trim()); }catch(e){
      var m=raw.match(/\{[\s\S]*\}/); if(m) try{cmd=JSON.parse(m[0]);}catch(e2){}
    }
    if(!cmd){ resEl.style.color='#ef4444'; resEl.textContent='⚠️ AIの返答を解析できませんでした'; return; }

    // ── アクション実行 ──
    await executeToolAction(cmd);
    resEl.style.color='#34a853';
    resEl.textContent='✅ '+cmd.reply;

  }catch(e){ resEl.style.color='#ef4444'; resEl.textContent='❌ エラー: '+e.message; }
}

// ── アクション実行（Firestoreを実際に操作） ──
async function executeToolAction(cmd){
  const{db,collection,doc,addDoc,setDoc,deleteDoc,getDocs,query,where}=fb();
  const act=cmd.action;

  if(act==='add_tool'){
    // 同じ道具名・同じ現場があれば数量加算、なければ新規
    const snap=await getDocs(query(collection(db,'tools'),where('name','==',cmd.toolName),where('location','==',cmd.toLocation)));
    if(!snap.empty){
      const d2=snap.docs[0]; const cur=d2.data().qty||0;
      await setDoc(doc(db,'tools',d2.id),{qty:cur+(cmd.qty||1),updatedAt:fb().serverTimestamp()},{merge:true});
    } else {
      await addDoc(collection(db,'tools'),{
        name:cmd.toolName, category:cmd.category||'その他',
        location:cmd.toLocation, qty:cmd.qty||1, memo:'',
        createdAt:fb().serverTimestamp(), updatedAt:fb().serverTimestamp(), createdBy:A.userDoc?.uid||''
      });
    }
    autoSaveToolMaster(cmd.toolName); // 新しい道具名なら自動でマスターに保存
  }

  else if(act==='move_tool'){
    // 移動元から減らす
    const fromSnap=await getDocs(query(collection(db,'tools'),where('name','==',cmd.toolName),where('location','==',cmd.fromLocation)));
    if(!fromSnap.empty){
      const d2=fromSnap.docs[0]; const cur=d2.data().qty||0; const newQty=cur-(cmd.qty||1);
      if(newQty<=0) await deleteDoc(doc(db,'tools',d2.id));
      else await setDoc(doc(db,'tools',d2.id),{qty:newQty,updatedAt:fb().serverTimestamp()},{merge:true});
    }
    // 移動先に加算
    const toSnap=await getDocs(query(collection(db,'tools'),where('name','==',cmd.toolName),where('location','==',cmd.toLocation)));
    if(!toSnap.empty){
      const d2=toSnap.docs[0]; const cur=d2.data().qty||0;
      await setDoc(doc(db,'tools',d2.id),{qty:cur+(cmd.qty||1),updatedAt:fb().serverTimestamp()},{merge:true});
    } else {
      await addDoc(collection(db,'tools'),{
        name:cmd.toolName, category:cmd.category||'その他',
        location:cmd.toLocation, qty:cmd.qty||1, memo:'',
        createdAt:fb().serverTimestamp(), updatedAt:fb().serverTimestamp(), createdBy:A.userDoc?.uid||''
      });
    }
    autoSaveToolMaster(cmd.toolName); // 新しい道具名なら自動でマスターに保存
  }

  else if(act==='remove_tool'){
    const snap=await getDocs(query(collection(db,'tools'),where('name','==',cmd.toolName),where('location','==',cmd.toLocation||cmd.fromLocation||'')));
    if(!snap.empty){
      const d2=snap.docs[0]; const cur=d2.data().qty||0; const newQty=cur-(cmd.qty||1);
      if(newQty<=0) await deleteDoc(doc(db,'tools',d2.id));
      else await setDoc(doc(db,'tools',d2.id),{qty:newQty,updatedAt:fb().serverTimestamp()},{merge:true});
    }
  }

  else if(act==='create_room'){
    const rname=(cmd.roomName||'新しいルーム').trim();
    const rtype=cmd.roomType||'site';
    await addDoc(collection(db,'rooms'),{
      name:rname, type:rtype, desc:rname,
      createdAt:fb().serverTimestamp(), lastAt:fb().serverTimestamp(),
      createdBy:A.userDoc?.uid||''
    });
    showToast('🏗️ ルーム「'+rname+'」を作成しました');
  }
  // query/unknown はFirestoreへの書き込みなし（AIの reply をそのまま表示）
}

</script>
</body>
</html>
