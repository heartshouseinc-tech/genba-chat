<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="現場チャット">
<link rel="manifest" href="chat-manifest.json">
<title>現場チャット</title>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider,
  createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
  onSnapshot, query, orderBy, limit, serverTimestamp, updateDoc,
  deleteDoc, where, arrayUnion }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

// ============================================================
// ★★★ Firebase設定 ★★★
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
  authDomain: "kensetsu-nippo-842a2.firebaseapp.com",
  projectId: "kensetsu-nippo-842a2",
  storageBucket: "kensetsu-nippo-842a2.firebasestorage.app",
  messagingSenderId: "702880974315",
  appId: "1:702880974315:web:985321dc9180046629c5ae"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

window.__fb = {
  auth, db, storage, googleProvider,
  signInWithEmailAndPassword, signInWithPopup, createUserWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile, GoogleAuthProvider,
  collection, doc, addDoc, setDoc, getDoc, getDocs,
  onSnapshot, query, orderBy, limit, serverTimestamp, updateDoc,
  deleteDoc, where, arrayUnion
};
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bm:#1565C0;--bd:#0D47A1;--bmi:#1976D2;--bl:#42A5F5;--bp:#BBDEFB;--bg:#E3F2FD;
  --g:#2E7D32;--gl:#43A047;--r:#C62828;--o:#E65100;
  --gray1:#F5F5F5;--gray2:#EEEEEE;--gray3:#E0E0E0;--gray4:#BDBDBD;
  --gray6:#757575;--gray8:#424242;--gray9:#212121;
  --white:#FFFFFF;
  --bubble-me:#DCF8C6;--bubble-me-dark:#1E3A2F;
  --bubble-other:#FFFFFF;--bubble-other-dark:#2D2D2D;
  --bg-chat:#ECE5DD;--bg-chat-dark:#1A1A2E;
  --font:'Hiragino Sans','Meiryo',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:#1565C0;}
body.dark{--white:#1E1E1E;--gray1:#2D2D2D;--gray2:#3D3D3D;--gray3:#4D4D4D;--gray4:#5D5D5D;--gray6:#AAAAAA;--gray8:#DDDDDD;--gray9:#EEEEEE;background:#0D1117;}

.screen{display:none;position:fixed;inset:0;flex-direction:column;}
.screen.active{display:flex;}

/* LOGIN */
#loginScreen{background:linear-gradient(160deg,#0D47A1,#1565C0,#1976D2);align-items:center;justify-content:center;padding:20px;}
.login-wrap{width:min(420px,100%);animation:fadeUp .4s ease;}
@keyframes fadeUp{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .ico{font-size:52px;display:block;margin-bottom:8px;}
.login-logo h1{color:#fff;font-size:22px;font-weight:700;}
.login-logo p{color:rgba(255,255,255,.7);font-size:13px;margin-top:4px;}
.login-card{background:#fff;border-radius:20px;padding:26px 22px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-tabs{display:flex;margin-bottom:20px;background:var(--gray1);border-radius:10px;padding:3px;}
.login-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:600;color:var(--gray6);cursor:pointer;transition:all .2s;}
.login-tab.active{background:#fff;color:var(--bm);box-shadow:0 2px 8px rgba(0,0,0,.1);}
.lg{margin-bottom:14px;}
.lg label{display:block;font-size:12px;font-weight:700;color:var(--gray8);margin-bottom:4px;}
.lg input{width:100%;padding:12px 13px;border:2px solid var(--gray3);border-radius:10px;font-size:16px;outline:none;transition:border-color .2s;}
.lg input:focus{border-color:var(--bm);}
.btn-google{width:100%;padding:12px;background:#fff;border:2px solid var(--gray3);border-radius:10px;font-size:14px;font-weight:600;color:var(--gray8);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all .2s;}
.btn-google:hover{background:var(--gray1);}
.g-icon{width:20px;height:20px;}
.btn-primary{width:100%;padding:13px;background:var(--bm);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--gray4);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray3);}
.login-err{color:var(--r);font-size:12px;text-align:center;margin-top:8px;min-height:16px;}

/* ROOM LIST */
#roomScreen{background:var(--gray1);}
.top-bar{background:var(--bm);color:#fff;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.top-bar h1{font-size:17px;font-weight:700;}
.top-bar-right{display:flex;gap:7px;}
.icon-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:background .2s;}
.icon-btn:hover{background:rgba(255,255,255,.3);}
.room-search{padding:8px 12px;background:#fff;border-bottom:1px solid var(--gray3);}
.room-search-wrap{position:relative;}
.room-search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;}
.room-search input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--gray3);border-radius:20px;font-size:14px;outline:none;background:var(--gray1);}
.room-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.room-section{padding:7px 12px 3px;font-size:11px;font-weight:700;color:var(--gray6);letter-spacing:.5px;background:var(--gray1);}
.room-item{display:flex;align-items:center;gap:11px;padding:11px 14px;background:#fff;border-bottom:1px solid var(--gray2);cursor:pointer;transition:background .15s;}
.room-item:active{background:var(--bg);}
.room-icon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.room-info{flex:1;min-width:0;}
.room-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.room-name{font-size:14px;font-weight:700;color:var(--gray9);}
.room-time{font-size:11px;color:var(--gray6);}
.room-last{font-size:12px;color:var(--gray6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread{background:var(--r);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.fab{position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;width:54px;height:54px;border-radius:50%;background:var(--bm);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(21,101,192,.4);display:flex;align-items:center;justify-content:center;z-index:10;}
.fab:active{transform:scale(.9);}

/* CHAT */
#chatScreen{background:var(--bg-chat);}
.chat-header{background:var(--bm);color:#fff;padding:10px 12px;display:flex;align-items:center;gap:9px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.back-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:2px;line-height:1;}
.chat-hinfo{flex:1;min-width:0;}
.chat-hname{font-size:15px;font-weight:700;}
.chat-hmeta{font-size:11px;opacity:.8;}
.chat-hact{display:flex;gap:5px;}

/* CALL BUTTON in header */
.call-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:background .2s;}
.call-btn:hover{background:rgba(255,255,255,.35);}
.call-btn.video{font-size:16px;}

.chat-msgs{flex:1;overflow-y:auto;padding:10px 8px;-webkit-overflow-scrolling:touch;}
.date-div{text-align:center;margin:14px 0;}
.date-div span{background:rgba(0,0,0,.28);color:#fff;font-size:11px;padding:4px 12px;border-radius:12px;}
.msg-row{display:flex;align-items:flex-end;gap:7px;margin-bottom:7px;}
.msg-row.me{flex-direction:row-reverse;}
.mavatar{width:30px;height:30px;border-radius:50%;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.mavatar img{width:100%;height:100%;object-fit:cover;}
.msg-body{max-width:74%;display:flex;flex-direction:column;}
.msg-row.me .msg-body{align-items:flex-end;}
.mname{font-size:10px;color:var(--gray6);margin-bottom:2px;padding:0 3px;}
.bubble{padding:9px 12px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 1px 2px rgba(0,0,0,.1);position:relative;}
.bubble.other{background:var(--bubble-other);border-radius:18px 18px 18px 4px;color:var(--gray9);}
.bubble.me{background:var(--bubble-me);border-radius:18px 18px 4px 18px;color:#1a3a1a;}
.bubble img{max-width:180px;max-height:180px;border-radius:8px;cursor:pointer;display:block;}
.mmeta{display:flex;align-items:center;gap:4px;margin-top:2px;padding:0 3px;}
.mtime{font-size:10px;color:var(--gray6);}
.mread{font-size:10px;color:var(--bl);}
.bubble .mactions{display:none;position:absolute;top:-34px;right:0;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.2);overflow:hidden;z-index:10;white-space:nowrap;}
.bubble:active .mactions,.bubble:hover .mactions{display:flex;}
.mact-btn{padding:7px 10px;border:none;background:none;font-size:12px;cursor:pointer;color:var(--gray8);}
.mact-btn.del{color:var(--r);}
.mention{color:var(--bm);font-weight:700;}

/* INPUT */
.chat-input-wrap{background:#fff;border-top:1px solid var(--gray3);padding:7px 8px;padding-bottom:calc(7px + var(--safe-bottom));flex-shrink:0;}
.input-row{display:flex;align-items:flex-end;gap:7px;}
.inp-acts{display:flex;gap:3px;}
.inp-act{width:36px;height:36px;border:none;background:transparent;color:var(--gray6);font-size:20px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.inp-act:hover{background:var(--gray2);}
.input-box{flex:1;display:flex;align-items:flex-end;background:var(--gray1);border:1.5px solid var(--gray3);border-radius:20px;padding:7px 12px;gap:6px;min-height:40px;}
.chat-input{flex:1;border:none;background:transparent;outline:none;font-size:14px;resize:none;max-height:110px;line-height:1.5;font-family:var(--font);}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--bm);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(21,101,192,.3);}
.send-btn:disabled{background:var(--gray4);box-shadow:none;cursor:default;}
.img-preview-row{display:none;padding:6px 0;gap:7px;flex-wrap:wrap;}
.img-preview-row.show{display:flex;}
.img-prev{position:relative;}
.img-prev img{width:60px;height:60px;object-fit:cover;border-radius:8px;}
.img-prev-rm{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--r);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mention-list{background:#fff;border:1px solid var(--gray3);border-radius:10px;max-height:150px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);margin:0 8px 4px;}
.mention-item{padding:9px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;}
.mention-item:active{background:var(--bg);}
.typing-bar{padding:3px 14px;font-size:11px;color:var(--gray6);min-height:20px;}

/* ===================== CALL UI ===================== */

/* Incoming call overlay */
#incomingCall{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;}
#incomingCall.show{display:flex;}
.incoming-card{background:#fff;border-radius:24px;padding:32px 28px;text-align:center;width:min(320px,90vw);animation:popIn .3s ease;box-shadow:0 20px 60px rgba(0,0,0,.4);}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:none;opacity:1}}
.incoming-avatar{width:72px;height:72px;border-radius:50%;background:var(--bl);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;overflow:hidden;}
.incoming-avatar img{width:100%;height:100%;object-fit:cover;}
.incoming-name{font-size:18px;font-weight:700;color:var(--gray9);margin-bottom:6px;}
.incoming-type{font-size:14px;color:var(--gray6);margin-bottom:24px;}
.call-answer-btns{display:flex;justify-content:center;gap:24px;}
.call-answer-btn{width:64px;height:64px;border-radius:50%;border:none;font-size:28px;cursor:pointer;transition:transform .15s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.call-answer-btn:active{transform:scale(.9);}
.call-answer-btn.accept{background:#00C853;}
.call-answer-btn.reject{background:var(--r);}
.call-ring{animation:ring 1s infinite;}
@keyframes ring{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* Active call overlay */
#activeCall{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#0D47A1,#1565C0);z-index:490;flex-direction:column;align-items:center;justify-content:space-between;padding:60px 20px calc(50px + var(--safe-bottom));}
#activeCall.show{display:flex;}
.call-peer-avatar{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.2);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:#fff;overflow:hidden;}
.call-peer-avatar img{width:100%;height:100%;object-fit:cover;}
.call-peer-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;}
.call-status{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:8px;}
.call-timer{font-size:28px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
.call-controls{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.call-ctrl-btn{width:64px;height:64px;border-radius:50%;border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.call-ctrl-btn:active{transform:scale(.9);}
.call-ctrl-btn.mute{background:rgba(255,255,255,.2);color:#fff;}
.call-ctrl-btn.mute.on{background:#FF6F00;color:#fff;}
.call-ctrl-btn.speaker{background:rgba(255,255,255,.2);color:#fff;}
.call-ctrl-btn.speaker.on{background:var(--gl);color:#fff;}
.call-ctrl-btn.hangup{background:#F44336;color:#fff;width:72px;height:72px;font-size:28px;}
.call-ctrl-btn.video{background:rgba(255,255,255,.2);color:#fff;}
/* Video elements */
#remoteVideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:480;display:none;background:#000;}
#remoteVideo.show{display:block;}
#localVideo{position:fixed;bottom:180px;right:16px;width:100px;height:140px;object-fit:cover;border-radius:12px;z-index:491;display:none;border:2px solid rgba(255,255,255,.5);}
#localVideo.show{display:block;}

/* Outgoing call */
#outgoingCall{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#0D47A1,#1565C0);z-index:500;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#outgoingCall.show{display:flex;}
.outgoing-avatar{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#fff;overflow:hidden;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}70%{box-shadow:0 0 0 20px rgba(255,255,255,0)}}
.outgoing-name{font-size:20px;font-weight:700;color:#fff;}
.outgoing-status{font-size:14px;color:rgba(255,255,255,.7);}
.btn-cancel-call{width:64px;height:64px;border-radius:50%;background:#F44336;border:none;font-size:26px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:10px;box-shadow:0 4px 16px rgba(0,0,0,.3);}

/* User list for calling */
#userListModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;align-items:flex-end;justify-content:center;}
#userListModal.open{display:flex;}
.user-list-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:20px;}
.user-list-handle{width:40px;height:4px;background:var(--gray3);border-radius:2px;margin:0 auto 16px;}
.user-list-title{font-size:16px;font-weight:700;margin-bottom:14px;}
.user-item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--gray2);cursor:pointer;}
.user-item:active{background:var(--bg);}
.user-item-avatar{width:44px;height:44px;border-radius:50%;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;}
.user-item-avatar img{width:100%;height:100%;object-fit:cover;}
.user-item-info{flex:1;}
.user-item-name{font-size:15px;font-weight:600;color:var(--gray9);}
.user-item-status{font-size:12px;color:var(--gray6);}
.call-type-btns{display:flex;gap:8px;}
.call-type-btn{width:38px;height:38px;border-radius:50%;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.call-type-btn.voice{background:var(--gl);color:#fff;}
.call-type-btn.video{background:var(--bm);color:#fff;}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-bg.center{align-items:center;padding:20px;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:20px;animation:slideUp .3s ease;}
.modal-sheet.ctr{border-radius:16px;animation:fadeIn .2s ease;max-width:400px;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
.modal-handle{width:38px;height:4px;background:var(--gray3);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-size:16px;font-weight:700;color:var(--gray9);margin-bottom:14px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--gray8);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border:2px solid var(--gray3);border-radius:10px;font-size:14px;outline:none;transition:border-color .2s;font-family:var(--font);}
.fg input:focus,.fg select:focus{border-color:var(--bm);}
.rtype-btns{display:flex;gap:7px;flex-wrap:wrap;}
.rtype-btn{padding:9px 14px;border:2px solid var(--gray3);border-radius:10px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.rtype-btn.active{border-color:var(--bm);background:var(--bg);color:var(--bm);}
.btn-row{display:flex;gap:9px;margin-top:14px;}
.btn-cancel{flex:1;padding:12px;background:var(--gray2);color:var(--gray8);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
.btn-submit{flex:2;padding:12px;background:var(--bm);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}

/* IMAGE VIEWER */
#imgViewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;align-items:center;justify-content:center;}
#imgViewer.open{display:flex;}
#imgViewer img{max-width:95%;max-height:90vh;border-radius:8px;object-fit:contain;}
#imgViewer .iv-close{position:absolute;top:16px;right:16px;color:#fff;font-size:26px;cursor:pointer;background:rgba(255,255,255,.1);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:700;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--g);}
.toast.error{background:var(--r);}

/* OFFLINE */
.offbar{display:none;background:var(--o);color:#fff;text-align:center;padding:5px;font-size:12px;font-weight:600;flex-shrink:0;}
.offbar.show{display:block;}

/* LOADING */
.loading{display:none;position:fixed;inset:0;background:var(--bm);z-index:800;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.loading.show{display:flex;}
.loader{width:42px;height:42px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#fff;font-size:15px;font-weight:600;}

/* DARK */
body.dark #roomScreen{background:#121212;}
body.dark .room-section{background:#121212;}
body.dark .room-item{background:#1E1E1E;border-color:#2D2D2D;}
body.dark .room-name{color:#eee;}
body.dark .room-last{color:#aaa;}
body.dark #chatScreen{background:var(--bg-chat-dark);}
body.dark .bubble.other{background:var(--bubble-other-dark);color:#ddd;}
body.dark .bubble.me{background:var(--bubble-me-dark);color:#90EE90;}
body.dark .chat-input-wrap{background:#1E1E1E;border-color:#2D2D2D;}
body.dark .input-box{background:#2D2D2D;border-color:#3D3D3D;}
body.dark .chat-input{color:#eee;}
body.dark .modal-sheet{background:#1E1E1E;}
body.dark .user-list-sheet{background:#1E1E1E;}
body.dark .modal-title,.user-list-title{color:#eee;}
body.dark .fg input,.fg select{background:#2D2D2D;border-color:#3D3D3D;color:#eee;}
body.dark .btn-cancel{background:#2D2D2D;color:#aaa;}
body.dark .mention-list{background:#1E1E1E;}
body.dark .room-search input{background:#2D2D2D;border-color:#3D3D3D;color:#eee;}
body.dark .incoming-card{background:#1E1E1E;}
body.dark .incoming-name{color:#eee;}
body.dark .user-item{border-color:#2D2D2D;}
body.dark .user-item-name{color:#eee;}

/* SCROLL */
.chat-msgs::-webkit-scrollbar,.room-list::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb,.room-list::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}

@media(min-width:768px){
  .chat-msgs{padding:14px 20%;}
  .chat-header,.chat-input-wrap{padding-left:20%;padding-right:20%;}
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading show" id="loadingScreen">
  <div class="loader"></div>
  <p>現場チャット 起動中...</p>
</div>

<!-- LOGIN -->
<div class="screen" id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">
      <span class="ico">👷</span>
      <h1>現場チャット</h1>
      <p>Construction Chat + 通話 PWA</p>
    </div>
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab('login')">ログイン</button>
        <button class="login-tab" onclick="switchTab('register')">新規登録</button>
      </div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
      <div class="divider">または</div>
      <div id="nameGrp" style="display:none;" class="lg">
        <label>お名前</label>
        <input type="text" id="regName" placeholder="田中 太郎">
      </div>
      <div class="lg">
        <label>メールアドレス</label>
        <input type="email" id="authEmail" placeholder="example@company.com" autocomplete="email">
      </div>
      <div class="lg">
        <label>パスワード</label>
        <input type="password" id="authPass" placeholder="6文字以上" autocomplete="current-password">
      </div>
      <div class="login-err" id="loginErr"></div>
      <button class="btn-primary" id="loginBtn" onclick="loginEmail()">🔑 ログイン</button>
    </div>
  </div>
</div>

<!-- ROOM LIST -->
<div class="screen" id="roomScreen">
  <div class="offbar" id="offBar1">📵 オフライン</div>
  <div class="top-bar">
    <h1>👷 現場チャット</h1>
    <div class="top-bar-right">
      <button class="icon-btn" onclick="openCallUsers()" title="通話">📞</button>
      <button class="icon-btn" onclick="toggleDark()" title="ダーク">🌙</button>
      <button class="icon-btn" onclick="openProfile()" title="設定">⚙️</button>
      <button class="icon-btn" onclick="doLogout()" title="ログアウト">🚪</button>
    </div>
  </div>
  <div class="room-search">
    <div class="room-search-wrap">
      <input type="text" placeholder="ルームを検索..." oninput="filterRooms(this.value)">
    </div>
  </div>
  <div class="room-list" id="roomList"></div>
  <button class="fab" onclick="openCreateRoom()">＋</button>
</div>

<!-- CHAT -->
<div class="screen" id="chatScreen">
  <div class="offbar" id="offBar2">📵 オフライン</div>
  <div class="chat-header">
    <button class="back-btn" onclick="goBack()">‹</button>
    <div class="chat-hinfo">
      <div class="chat-hname" id="chatName">全体チャット</div>
      <div class="chat-hmeta" id="chatMeta"></div>
    </div>
    <div class="chat-hact">
      <button class="call-btn" onclick="startCall('voice')" title="音声通話">📞</button>
      <button class="call-btn video" onclick="startCall('video')" title="ビデオ通話">📹</button>
      <button class="icon-btn" onclick="openSearchModal()" title="検索">🔍</button>
    </div>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="typing-bar" id="typingBar"></div>
  <div class="mention-list" id="mentionList" style="display:none;"></div>
  <div class="img-preview-row" id="imgPrev"></div>
  <div class="chat-input-wrap">
    <div class="input-row">
      <div class="inp-acts">
        <button class="inp-act" onclick="document.getElementById('imgInput').click()" title="画像">📷</button>
        <button class="inp-act" onclick="startVoice()" id="voiceBtn" title="音声入力">🎤</button>
      </div>
      <div class="input-box">
        <textarea class="chat-input" id="chatInput" placeholder="メッセージを入力..." rows="1"
          oninput="onInput(this)" onkeydown="onKeydown(event)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>➤</button>
    </div>
    <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleImgs(this)">
  </div>
</div>

<!-- ===== CALL UI ===== -->

<!-- Incoming call -->
<div id="incomingCall">
  <div class="incoming-card">
    <div class="incoming-avatar call-ring" id="incAvatar">👷</div>
    <div class="incoming-name" id="incName">田中 太郎</div>
    <div class="incoming-type" id="incType">📞 音声通話</div>
    <div class="call-answer-btns">
      <button class="call-answer-btn reject" onclick="rejectCall()">📵</button>
      <button class="call-answer-btn accept" onclick="acceptCall()">📞</button>
    </div>
  </div>
</div>

<!-- Outgoing call -->
<div id="outgoingCall">
  <div class="outgoing-avatar" id="outAvatar">👷</div>
  <div class="outgoing-name" id="outName">田中 太郎</div>
  <div class="outgoing-status" id="outStatus">呼び出し中...</div>
  <button class="btn-cancel-call" onclick="cancelCall()">📵</button>
</div>

<!-- Active call -->
<video id="remoteVideo" autoplay playsinline></video>
<video id="localVideo" autoplay playsinline muted></video>
<div id="activeCall">
  <div style="text-align:center;">
    <div class="call-peer-avatar" id="callPeerAvatar">👷</div>
    <div class="call-peer-name" id="callPeerName">田中 太郎</div>
    <div class="call-status" id="callStatusText">通話中</div>
    <div class="call-timer" id="callTimer">00:00</div>
  </div>
  <div class="call-controls">
    <button class="call-ctrl-btn mute" id="muteBtn" onclick="toggleMute()" title="ミュート">🎤</button>
    <button class="call-ctrl-btn speaker" id="speakerBtn" onclick="toggleSpeaker()" title="スピーカー">🔊</button>
    <button class="call-ctrl-btn video" id="videoToggleBtn" onclick="toggleVideo()" title="ビデオ">📹</button>
    <button class="call-ctrl-btn hangup" onclick="hangupCall()" title="終話">📵</button>
  </div>
</div>

<!-- User list for call -->
<div id="userListModal">
  <div class="user-list-sheet">
    <div class="user-list-handle"></div>
    <div class="user-list-title">📞 通話するユーザーを選択</div>
    <div id="userListItems"></div>
  </div>
</div>

<!-- CREATE ROOM -->
<div class="modal-bg" id="createRoomModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">新しいルームを作成</div>
    <div class="fg">
      <label>ルーム名</label>
      <input type="text" id="newRoomName" placeholder="例：2号棟現場">
    </div>
    <div class="fg">
      <label>ルームタイプ</label>
      <div class="rtype-btns">
        <button class="rtype-btn active" data-type="general" onclick="selRType(this)">🌐 全体</button>
        <button class="rtype-btn" data-type="site" onclick="selRType(this)">🏗️ 現場</button>
        <button class="rtype-btn" data-type="dept" onclick="selRType(this)">👥 部署</button>
        <button class="rtype-btn" data-type="private" onclick="selRType(this)">🔒 非公開</button>
      </div>
    </div>
    <div class="fg">
      <label>説明（任意）</label>
      <input type="text" id="newRoomDesc" placeholder="このルームの説明">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('createRoomModal')">キャンセル</button>
      <button class="btn-submit" onclick="createRoom()">作成</button>
    </div>
  </div>
</div>

<!-- PROFILE -->
<div class="modal-bg center" id="profileModal">
  <div class="modal-sheet ctr">
    <div class="modal-title">⚙️ プロフィール</div>
    <div class="fg">
      <label>表示名</label>
      <input type="text" id="profName" placeholder="田中 太郎">
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('profileModal')">キャンセル</button>
      <button class="btn-submit" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="modal-bg center" id="searchModal">
  <div class="modal-sheet ctr" style="max-width:480px;">
    <div class="modal-title">🔍 メッセージ検索</div>
    <div class="fg">
      <input type="text" id="searchQ" placeholder="キーワード..." oninput="searchMsgs(this.value)">
    </div>
    <div id="searchResults" style="max-height:280px;overflow-y:auto;"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal('searchModal')">閉じる</button>
    </div>
  </div>
</div>

<!-- IMAGE VIEWER -->
<div id="imgViewer">
  <div class="iv-close" onclick="closeViewer()">✕</div>
  <img id="viewerImg" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<audio id="ringtone" loop>
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA..." type="audio/wav">
</audio>

<script>
// ===================== STATE =====================
const A = {
  user: null, userDoc: null, isAdmin: false,
  currentRoom: null, rooms: [], messages: [],
  msgUnsub: null, roomUnsub: null, callUnsub: null,
  pendingImgs: [], isDark: localStorage.getItem('dark')==='1',
  selRoomType: 'general', allUsers: [],
  // WebRTC
  pc: null, localStream: null, remoteStream: null,
  callDoc: null, callId: null,
  callType: null, // 'voice' | 'video'
  isCaller: false,
  isMuted: false, isSpeaker: false, isVideoOff: false,
  callTimerInt: null, callSeconds: 0,
  calleeUid: null, callerUid: null,
  callerName: '', callerPhoto: '',
};

const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
  ]
};

function fb(){ return window.__fb; }
if(A.isDark) document.body.classList.add('dark');

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', ()=>{
  const upd = () => {
    const off = !navigator.onLine;
    document.getElementById('offBar1').classList.toggle('show', off);
    document.getElementById('offBar2').classList.toggle('show', off);
  };
  window.addEventListener('online', ()=>{ upd(); showToast('オンライン復帰','success'); });
  window.addEventListener('offline', upd); upd();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('chat-sw.js').catch(()=>{});

  fb().onAuthStateChanged(fb().auth, async user => {
    document.getElementById('loadingScreen').classList.remove('show');
    if(user){
      A.user = user;
      await loadUserDoc();
      showScr('roomScreen');
      loadRooms();
      listenIncomingCalls();
      loadAllUsers();
    } else {
      A.user = null;
      cleanupAll();
      showScr('loginScreen');
    }
  });

  // Close modals on bg tap
  document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); }));
  document.getElementById('userListModal').addEventListener('click', e => { if(e.target===document.getElementById('userListModal')) document.getElementById('userListModal').classList.remove('open'); });
});

async function loadUserDoc(){
  const { db, doc, getDoc, setDoc, serverTimestamp } = fb();
  try {
    const snap = await getDoc(doc(db,'users',A.user.uid));
    if(snap.exists()){ A.userDoc = snap.data(); A.isAdmin = !!snap.data().isAdmin; }
    else {
      const d = { uid:A.user.uid, name:A.user.displayName||A.user.email.split('@')[0], email:A.user.email, photoURL:A.user.photoURL||'', isAdmin:false, createdAt:serverTimestamp() };
      await setDoc(doc(db,'users',A.user.uid), d);
      A.userDoc = d;
    }
  } catch(e){ console.error(e); }
}

async function loadAllUsers(){
  const { db, collection, getDocs } = fb();
  try {
    const snap = await getDocs(collection(db,'users'));
    A.allUsers = [];
    snap.forEach(d => { if(d.id !== A.user.uid) A.allUsers.push({uid:d.id,...d.data()}); });
  } catch(e){}
}

// ===================== AUTH =====================
let curTab = 'login';
function switchTab(t){
  curTab = t;
  document.querySelectorAll('.login-tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('nameGrp').style.display = t==='register'?'':'none';
  document.getElementById('loginBtn').textContent = t==='register'?'📝 新規登録':'🔑 ログイン';
}
async function loginGoogle(){ try { await fb().signInWithPopup(fb().auth, fb().googleProvider); } catch(e){ document.getElementById('loginErr').textContent='Googleログイン失敗: '+e.message; } }
async function loginEmail(){
  const email=document.getElementById('authEmail').value.trim(), pass=document.getElementById('authPass').value;
  const err=document.getElementById('loginErr'); err.textContent='';
  if(!email||!pass){err.textContent='メールとパスワードを入力してください';return;}
  try {
    if(curTab==='register'){
      const name=document.getElementById('regName').value.trim();
      if(!name){err.textContent='お名前を入力してください';return;}
      const c=await fb().createUserWithEmailAndPassword(fb().auth,email,pass);
      await fb().updateProfile(c.user,{displayName:name});
    } else { await fb().signInWithEmailAndPassword(fb().auth,email,pass); }
  } catch(e){ err.textContent=authMsg(e.code); }
}
function authMsg(c){ const m={'auth/user-not-found':'ユーザーが見つかりません','auth/wrong-password':'パスワードが間違っています','auth/email-already-in-use':'このメールは使用中です','auth/weak-password':'パスワードは6文字以上','auth/invalid-credential':'メールまたはパスワードが間違っています'}; return m[c]||c; }
async function doLogout(){ if(!confirm('ログアウトしますか？'))return; cleanupAll(); await fb().signOut(fb().auth); }
function toggleDark(){ A.isDark=!A.isDark; document.body.classList.toggle('dark',A.isDark); localStorage.setItem('dark',A.isDark?'1':'0'); }

// ===================== ROOMS =====================
const RICONS={general:'🌐',site:'🏗️',dept:'👥',private:'🔒'};
const RCOLORS={general:'#1565C0',site:'#2E7D32',dept:'#6A1B9A',private:'#BF360C'};
const DEF_ROOMS=[{id:'general',name:'全体チャット',type:'general',desc:'全員参加',createdBy:'system'},{id:'site-1',name:'1号棟現場',type:'site',desc:'1号棟連絡',createdBy:'system'},{id:'dept-workers',name:'作業員チーム',type:'dept',desc:'作業員グループ',createdBy:'system'}];

async function loadRooms(){
  const { db, collection, onSnapshot, query, orderBy, doc, setDoc, serverTimestamp } = fb();
  for(const r of DEF_ROOMS){
    try { const s=await fb().getDoc(doc(db,'rooms',r.id)); if(!s.exists()) await setDoc(doc(db,'rooms',r.id),{...r,createdAt:serverTimestamp(),lastMessage:'',lastAt:null}); } catch(e){}
  }
  const q=query(collection(db,'rooms'),orderBy('lastAt','desc'));
  A.roomUnsub=onSnapshot(q,snap=>{ A.rooms=[]; snap.forEach(d=>A.rooms.push({id:d.id,...d.data()})); renderRooms(A.rooms); },err=>console.error(err));
}

function renderRooms(rooms){
  const list=document.getElementById('roomList'); list.innerHTML='';
  const groups={general:[],site:[],dept:[],private:[]};
  rooms.forEach(r=>{ const t=r.type||'general'; (groups[t]||groups.general).push(r); });
  const labels={general:'全体',site:'現場別',dept:'部署別',private:'非公開'};
  Object.entries(groups).forEach(([type,rms])=>{
    if(!rms.length)return;
    const sec=document.createElement('div'); sec.className='room-section'; sec.textContent=labels[type]; list.appendChild(sec);
    rms.forEach(r=>{
      const div=document.createElement('div'); div.className='room-item'; div.onclick=()=>openRoom(r);
      const ic=RICONS[r.type]||'💬', col=RCOLORS[r.type]||'#1565C0';
      const last=r.lastMessage?esc(r.lastMessage).substring(0,30):'メッセージなし';
      const time=r.lastAt?fmtTime(r.lastAt.toDate?r.lastAt.toDate():new Date(r.lastAt)):'';
      div.innerHTML=`<div class="room-icon" style="background:${col}20;">${ic}</div><div class="room-info"><div class="room-top"><span class="room-name">${esc(r.name)}</span><span class="room-time">${time}</span></div><div class="room-last">${last}</div></div>`;
      list.appendChild(div);
    });
  });
}

function filterRooms(q){ renderRooms(q?A.rooms.filter(r=>r.name.toLowerCase().includes(q.toLowerCase())):A.rooms); }

// ===================== CHAT =====================
function openRoom(room){
  A.currentRoom=room; A.messages=[];
  document.getElementById('chatName').textContent=room.name;
  document.getElementById('chatMeta').textContent=(RICONS[room.type]||'💬')+' '+(room.desc||'');
  showScr('chatScreen');
  document.getElementById('chatMsgs').innerHTML='';
  if(A.msgUnsub){A.msgUnsub();A.msgUnsub=null;}
  listenMsgs(room.id);
}

function goBack(){
  if(A.msgUnsub){A.msgUnsub();A.msgUnsub=null;}
  A.currentRoom=null; showScr('roomScreen');
}

function listenMsgs(roomId){
  const { db, collection, query, orderBy, limit, onSnapshot } = fb();
  const q=query(collection(db,'rooms',roomId,'messages'),orderBy('createdAt','asc'),limit(100));
  A.msgUnsub=onSnapshot(q,snap=>{
    const c=document.getElementById('chatMsgs');
    const atBot=c.scrollHeight-c.scrollTop-c.clientHeight<80;
    snap.docChanges().forEach(ch=>{
      if(ch.type==='added'){ const m={id:ch.doc.id,...ch.doc.data()}; A.messages.push(m); appendMsg(m); markRead(roomId,m.id); }
      else if(ch.type==='modified'){ const m={id:ch.doc.id,...ch.doc.data()}; const i=A.messages.findIndex(x=>x.id===m.id); if(i>=0)A.messages[i]=m; updateMsgEl(m); }
      else if(ch.type==='removed'){ const el=document.getElementById('m-'+ch.doc.id); if(el)el.remove(); }
    });
    if(atBot)scrollBot();
  },err=>console.error(err));
}

async function markRead(rid,mid){ try { const{db,doc,updateDoc,arrayUnion}=fb(); await updateDoc(doc(db,'rooms',rid,'messages',mid),{readBy:arrayUnion(A.user.uid)}); }catch(e){} }

function appendMsg(msg){
  const c=document.getElementById('chatMsgs');
  const d=msg.createdAt?.toDate?msg.createdAt.toDate():new Date();
  const dk=d.toDateString();
  if(!c.querySelector(`[data-date="${dk}"]`)){
    const dv=document.createElement('div'); dv.className='date-div'; dv.dataset.date=dk;
    dv.innerHTML=`<span>${fmtDate(d)}</span>`; c.appendChild(dv);
  }
  const isMe=msg.uid===A.user?.uid;
  const row=document.createElement('div'); row.className='msg-row'+(isMe?' me':''); row.id='m-'+msg.id;
  const name=esc(msg.name||'不明');
  const avContent=msg.photoURL?`<img src="${msg.photoURL}" alt="">`:(msg.name||'?').charAt(0);

  const read=isMe&&msg.readBy&&msg.readBy.length>1?`<span class="mread">既読${msg.readBy.length-1}</span>`:'';
  const canDel=isMe||A.isAdmin;
  const delBtn=canDel?`<button class="mact-btn del" onclick="delMsg('${msg.id}')">削除</button>`:'';
  let content=msg.imageUrl?`<img src="${msg.imageUrl}" alt="画像" onclick="openViewer('${msg.imageUrl}')">`  :fmtText(msg.text||'');
  // System call messages

  row.innerHTML=`${!isMe?`<div class="mavatar">${avContent}</div>`:''}<div class="msg-body">${!isMe?`<div class="mname">${name}</div>`:''}<div class="bubble ${isMe?'me':'other'}">${content}<div class="mactions"><button class="mact-btn" onclick="replyTo('${msg.id}')">返信</button>${delBtn}</div></div><div class="mmeta"><span class="mtime">${time}</span>${read}</div></div>${isMe?`<div class="mavatar">${avContent}</div>`:''}`;
  c.appendChild(row);
}

let sending=false;
async function sendMsg(){
  if(sending)return;
  const inp=document.getElementById('chatInput'), text=inp.value.trim();
  if(!text&&A.pendingImgs.length===0)return;
  if(!A.currentRoom)return;
  sending=true; document.getElementById('sendBtn').disabled=true;
  try {
    const{db,collection,addDoc,serverTimestamp,doc,updateDoc}=fb();
    const rid=A.currentRoom.id;
    for(const img of A.pendingImgs){
      const{storage,ref,uploadBytes,getDownloadURL}=fb();
      const sr=ref(storage,`chat/${rid}/${Date.now()}_${img.name}`);
      const snap=await uploadBytes(sr,img.blob);
      const url=await getDownloadURL(snap.ref);
      await addDoc(collection(db,'rooms',rid,'messages'),{uid:A.user.uid,name:A.userDoc?.name||A.user.displayName||A.user.email,photoURL:A.user.photoURL||'',text:'',imageUrl:url,createdAt:serverTimestamp(),readBy:[A.user.uid]});
    }
    A.pendingImgs=[]; document.getElementById('imgPrev').innerHTML=''; document.getElementById('imgPrev').classList.remove('show');
    if(text){
      await addDoc(collection(db,'rooms',rid,'messages'),{uid:A.user.uid,name:A.userDoc?.name||A.user.displayName||A.user.email,photoURL:A.user.photoURL||'',text,imageUrl:'',createdAt:serverTimestamp(),readBy:[A.user.uid]});
      inp.value=''; inp.style.height='auto';
    }
    await updateDoc(doc(db,'rooms',rid),{lastMessage:text||'📷 画像',lastAt:serverTimestamp()});
    document.getElementById('sendBtn').disabled=true; scrollBot();
  } catch(e){ showToast('送信失敗: '+e.message,'error'); }
  sending=false;
}

function onInput(el){

async function handleImgs(input){
  const files=Array.from(input.files), prev=document.getElementById('imgPrev');
  prev.classList.add('show');
  for(const f of files){
    const r=new FileReader();
    r.onload=e=>{
      const w=document.createElement('div'); w.className='img-prev';
      const idx=A.pendingImgs.length;
      w.innerHTML=`<img src="${e.target.result}" alt=""><button class="img-prev-rm" onclick="rmImg(${idx})">×</button>`;
      prev.appendChild(w); A.pendingImgs.push({blob:f,name:f.name,url:e.target.result});
      document.getElementById('sendBtn').disabled=false;
    };
    r.readAsDataURL(f);
  }
  input.value='';
}
function rmImg(i){ A.pendingImgs.splice(i,1); const p=document.getElementById('imgPrev'); p.innerHTML=''; A.pendingImgs.forEach((img,j)=>{ const w=document.createElement('div'); w.className='img-prev'; w.innerHTML=`<img src="${img.url}" alt=""><button class="img-prev-rm" onclick="rmImg(${j})">×</button>`; p.appendChild(w); }); if(!A.pendingImgs.length)p.classList.remove('show'); document.getElementById('sendBtn').disabled=A.pendingImgs.length===0&&!document.getElementById('chatInput').value.trim(); }

function startVoice(){

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition, rec=new SR(); rec.lang='ja-JP';

async function initiateCall(targetUid, type){
  document.getElementById('userListModal').classList.remove('open');
  const target = A.allUsers.find(u => u.uid === targetUid);
  if(!target){ showToast('ユーザーが見つかりません','error'); return; }

  A.callType = type;
  A.isCaller = true;
  A.calleeUid = targetUid;

  // Show outgoing UI
  const av = document.getElementById('outAvatar');
  av.innerHTML = target.photoURL ? `<img src="${target.photoURL}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (target.name||'?').charAt(0);
  document.getElementById('outName').textContent = target.name || target.email;
  document.getElementById('outStatus').textContent = type === 'video' ? '📹 ビデオ通話 呼び出し中...' : '📞 音声通話 呼び出し中...';
  document.getElementById('outgoingCall').classList.add('show');

  // Get media
  try {
    A.localStream = await navigator.mediaDevices.getUserMedia(type === 'video' ? {video:true,audio:true} : {audio:true,video:false});
    if(type === 'video'){
      document.getElementById('localVideo').srcObject = A.localStream;
      document.getElementById('localVideo').classList.add('show');
    }
  } catch(e){
    document.getElementById('outgoingCall').classList.remove('show');
    showToast('マイク/カメラへのアクセスを許可してください','error');
    return;
  }

  // Create RTCPeerConnection
  A.pc = new RTCPeerConnection(ICE_SERVERS);
  A.localStream.getTracks().forEach(t => A.pc.addTrack(t, A.localStream));

  A.remoteStream = new MediaStream();
  A.pc.ontrack = e => { e.streams[0].getTracks().forEach(t => A.remoteStream.addTrack(t)); };

  // Create call document in Firestore
  const { db, collection, addDoc, serverTimestamp, onSnapshot, doc, updateDoc } = fb();
  const callRef = await addDoc(collection(db,'calls'), {
    callerId: A.user.uid, callerName: A.userDoc?.name || A.user.displayName || A.user.email,
    callerPhoto: A.user.photoURL || '',
    calleeId: targetUid, type: type,
    status: 'calling', createdAt: serverTimestamp(),
    offer: null, answer: null
  });
  A.callId = callRef.id;
  A.callDoc = callRef;

  // Collect ICE candidates
  const iceColl = collection(db,'calls',A.callId,'callerCandidates');
  A.pc.onicecandidate = e => { if(e.candidate) addDoc(iceColl, e.candidate.toJSON()); };

  // Create offer
  const offer = await A.pc.createOffer();
  await A.pc.setLocalDescription(offer);
  await updateDoc(doc(db,'calls',A.callId), { offer: { type: offer.type, sdp: offer.sdp } });

  // Listen for answer & status
  A.callUnsub = onSnapshot(doc(db,'calls',A.callId), async snap => {
    const data = snap.data();
    if(!data) return;
    if(data.answer && !A.pc.remoteDescription){
      const ans = new RTCSessionDescription(data.answer);
      await A.pc.setRemoteDescription(ans);
    }
    if(data.status === 'accepted'){
      document.getElementById('outgoingCall').classList.remove('show');
      showActiveCall(target.name || target.email, target.photoURL);
    }
    if(data.status === 'rejected' || data.status === 'ended'){
      document.getElementById('outgoingCall').classList.remove('show');
      cleanupCall();
      showToast(data.status === 'rejected' ? '通話を拒否されました' : '通話が終了しました');
    }
  });

  // Listen for callee ICE candidates
  onSnapshot(collection(db,'calls',A.callId,'calleeCandidates'), snap => {
    snap.docChanges().forEach(async ch => {
      if(ch.type === 'added') try { await A.pc.addIceCandidate(new RTCIceCandidate(ch.doc.data())); } catch(e){}
    });
  });
}

// Listen for incoming calls
function listenIncomingCalls(){
  const { db, collection, query, where, onSnapshot } = fb();
  const q = query(collection(db,'calls'), where('calleeId','==',A.user.uid), where('status','==','calling'));
  onSnapshot(q, snap => {
    snap.docChanges().forEach(ch => {
      if(ch.type === 'added'){
        const data = { id: ch.doc.id, ...ch.doc.data() };
        // Only show if not already in a call
        if(!A.callId) showIncomingCall(data);
      }
    });
  });
}

function showIncomingCall(data){
  A.callId = data.id;
  A.callerUid = data.callerId;
  A.callerName = data.callerName;
  A.callerPhoto = data.callerPhoto;
  A.callType = data.type;
  A.isCaller = false;

  const av = document.getElementById('incAvatar');
  av.innerHTML = data.callerPhoto ? `<img src="${data.callerPhoto}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (data.callerName||'?').charAt(0);
  document.getElementById('incName').textContent = data.callerName || '不明';
  document.getElementById('incType').textContent = data.type === 'video' ? '📹 ビデオ通話' : '📞 音声通話';
  document.getElementById('incomingCall').classList.add('show');

  // Ringtone simulation with vibration
  if(navigator.vibrate) navigator.vibrate([500,300,500,300,500]);
}

async function acceptCall(){
  document.getElementById('incomingCall').classList.remove('show');
  const { db, doc, getDoc, updateDoc, collection, addDoc, onSnapshot } = fb();

  try {
    A.localStream = await navigator.mediaDevices.getUserMedia(A.callType === 'video' ? {video:true,audio:true} : {audio:true,video:false});
    if(A.callType === 'video'){
      document.getElementById('localVideo').srcObject = A.localStream;
      document.getElementById('localVideo').classList.add('show');
    }
  } catch(e){ showToast('マイク/カメラアクセスを許可してください','error'); return; }

  A.pc = new RTCPeerConnection(ICE_SERVERS);
  A.localStream.getTracks().forEach(t => A.pc.addTrack(t, A.localStream));
  A.remoteStream = new MediaStream();
  A.pc.ontrack = e => {
    e.streams[0].getTracks().forEach(t => A.remoteStream.addTrack(t));
    if(A.callType === 'video'){
      document.getElementById('remoteVideo').srcObject = A.remoteStream;
      document.getElementById('remoteVideo').classList.add('show');
    } else {
      // Audio only - play through audio element
      const audio = new Audio(); audio.srcObject = A.remoteStream; audio.play().catch(()=>{});
    }
  };

  // Collect callee ICE
  const iceColl = collection(db,'calls',A.callId,'calleeCandidates');
  A.pc.onicecandidate = e => { if(e.candidate) addDoc(iceColl, e.candidate.toJSON()); };

  // Get offer
  const callSnap = await getDoc(doc(db,'calls',A.callId));
  const offer = callSnap.data().offer;
  await A.pc.setRemoteDescription(new RTCSessionDescription(offer));

  // Create answer
  const answer = await A.pc.createAnswer();
  await A.pc.setLocalDescription(answer);
  await updateDoc(doc(db,'calls',A.callId), { answer: { type: answer.type, sdp: answer.sdp }, status: 'accepted' });

  // Listen for caller ICE
  onSnapshot(collection(db,'calls',A.callId,'callerCandidates'), snap => {
    snap.docChanges().forEach(async ch => {
      if(ch.type === 'added') try { await A.pc.addIceCandidate(new RTCIceCandidate(ch.doc.data())); } catch(e){}
    });
  });

  // Listen for end
  A.callUnsub = onSnapshot(doc(db,'calls',A.callId), snap => {
    const data = snap.data();
    if(data?.status === 'ended'){ cleanupCall(); showToast('通話が終了しました'); }
  });

  showActiveCall(A.callerName, A.callerPhoto);
}

async function rejectCall(){
  document.getElementById('incomingCall').classList.remove('show');
  try {
    const { db, doc, updateDoc } = fb();
    await updateDoc(doc(db,'calls',A.callId), { status: 'rejected' });
  } catch(e){}
  A.callId = null;
}

async function cancelCall(){
  document.getElementById('outgoingCall').classList.remove('show');
  try {
    const { db, doc, updateDoc } = fb();
    await updateDoc(doc(db,'calls',A.callId), { status: 'rejected' });
  } catch(e){}
  cleanupCall();
}

async function hangupCall(){
  try {
    const { db, doc, updateDoc } = fb();
    await updateDoc(doc(db,'calls',A.callId), { status: 'ended' });
    // Send call message to chat
    if(A.currentRoom){
      const { collection, addDoc, serverTimestamp } = fb();
      const secs = A.callSeconds;
      const dur = secs >= 60 ? `${Math.floor(secs/60)}分${secs%60}秒` : `${secs}秒`;
      await addDoc(collection(db,'rooms',A.currentRoom.id,'messages'), {
        uid: A.user.uid, name: A.userDoc?.name || A.user.displayName || A.user.email,
        photoURL: A.user.photoURL || '', text: `📞 通話終了 (${dur})`,
        imageUrl: '', type: 'call', createdAt: serverTimestamp(), readBy: [A.user.uid]
      });
    }
  } catch(e){}
  cleanupCall();
}

function showActiveCall(peerName, peerPhoto){
  const av = document.getElementById('callPeerAvatar');
  av.innerHTML = peerPhoto ? `<img src="${peerPhoto}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (peerName||'?').charAt(0);
  document.getElementById('callPeerName').textContent = peerName;
  document.getElementById('callStatusText').textContent = A.callType === 'video' ? '📹 ビデオ通話中' : '📞 音声通話中';

  if(A.callType === 'video' && A.remoteStream){
    document.getElementById('remoteVideo').srcObject = A.remoteStream;
    document.getElementById('remoteVideo').classList.add('show');
  } else if(A.callType !== 'video' && A.remoteStream){
    const audio = new Audio(); audio.srcObject = A.remoteStream; audio.play().catch(()=>{});
  }

  document.getElementById('activeCall').classList.add('show');
  A.callSeconds = 0;
  A.callTimerInt = setInterval(()=>{
    A.callSeconds++;
    const m = Math.floor(A.callSeconds/60), s = A.callSeconds%60;
    document.getElementById('callTimer').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function toggleMute(){
  A.isMuted = !A.isMuted;
  if(A.localStream) A.localStream.getAudioTracks().forEach(t => t.enabled = !A.isMuted);
  document.getElementById('muteBtn').classList.toggle('on', A.isMuted);
  document.getElementById('muteBtn').textContent = A.isMuted ? '🔇' : '🎤';
  showToast(A.isMuted ? 'ミュート中' : 'ミュート解除');
}

function toggleSpeaker(){
  A.isSpeaker = !A.isSpeaker;
  document.getElementById('speakerBtn').classList.toggle('on', A.isSpeaker);
  showToast(A.isSpeaker ? 'スピーカーON' : 'スピーカーOFF');
}

function toggleVideo(){
  if(A.callType !== 'video'){ showToast('音声通話中はビデオ使用不可','error'); return; }
  A.isVideoOff = !A.isVideoOff;
  if(A.localStream) A.localStream.getVideoTracks().forEach(t => t.enabled = !A.isVideoOff);
  document.getElementById('videoToggleBtn').textContent = A.isVideoOff ? '📵' : '📹';
  showToast(A.isVideoOff ? 'カメラOFF' : 'カメラON');
}

function cleanupCall(){
  if(A.callTimerInt){ clearInterval(A.callTimerInt); A.callTimerInt = null; }
  if(A.pc){ A.pc.close(); A.pc = null; }
  if(A.localStream){ A.localStream.getTracks().forEach(t => t.stop()); A.localStream = null; }
  if(A.callUnsub){ A.callUnsub(); A.callUnsub = null; }
  A.callId = null; A.isCaller = false; A.isMuted = false; A.isVideoOff = false;
  document.getElementById('activeCall').classList.remove('show');
  document.getElementById('outgoingCall').classList.remove('show');
  document.getElementById('incomingCall').classList.remove('show');
  document.getElementById('remoteVideo').classList.remove('show');
  document.getElementById('localVideo').classList.remove('show');
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('muteBtn').classList.remove('on');
  document.getElementById('muteBtn').textContent = '🎤';
  document.getElementById('videoToggleBtn').textContent = '📹';
  document.getElementById('callTimer').textContent = '00:00';
  A.callSeconds = 0;
}

  if(A.msgUnsub){A.msgUnsub();A.msgUnsub=null;}
  if(A.roomUnsub){A.roomUnsub();A.roomUnsub=null;}
}
function showScr(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function scrollBot(){ const el=document.getElementById('chatMsgs'); el.scrollTop=el.scrollHeight; }
function fmtTime(d){ if(!d)return''; const now=new Date(), ms=now-d, m=Math.floor(ms/60000); if(m<1)return'たった今'; if(m<60)return`${m}分前`; if(m<1440)return`${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`; return`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtDate(d){ const now=new Date(), diff=Math.floor((now-d)/86400000); if(diff===0)return'今日'; if(diff===1)return'昨日'; return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let tt; function showToast(msg,type=''){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'+(type?' '+type:''); clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),3000); }
</script>
